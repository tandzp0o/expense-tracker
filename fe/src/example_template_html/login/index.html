<body class="bg-surface font-body text-on-surface selection:bg-primary selection:text-on-primary min-h-screen flex flex-col overflow-hidden">

<div class="fixed inset-0 z-0 pointer-events-none">

<stop offset="100%" style="stop-color:#c0c1ff;stop-opacity:0"></stop>

<p class="text-on-surface-variant text-sm mt-1">Authenticate to access your private vault.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Vault ID Input -->
<div class="space-y-2">
<label class="text-[11px] uppercase tracking-wider text-on-surface-variant/80 font-semibold px-1">Vault ID</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest/40 border-b border-outline-variant/30 text-on-surface placeholder:text-on-surface-variant/40 px-4 py-4 rounded-t-lg focus:outline-none focus:border-primary transition-colors duration-500 text-sm" placeholder="Enter your unique identifier" type="text"/>

</div>
</div>

</div>
<div class="relative group">

<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-700 ease-in-out"></div>
</div>
</div>
