<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm SKMT & BNN - Có Animation</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1b4b;
            --card-bg: #312e81;
            --text-main: #e0e7ff;
            --btn-bg: #4f46e5;
            --btn-hover: #4338ca;
            --correct: #10b981;
            --wrong: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .quiz-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .question {
            font-size: 1.4em;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background-color: var(--btn-bg);
            color: white;
            border: 2px solid transparent;
            padding: 15px 20px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .option-label {
            font-weight: bold;
            margin-right: 15px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 5px;
        }
        
        /* Animations */
        .correct-ans {
            background-color: var(--correct) !important;
            border-color: #fff !important;
            box-shadow: 0 0 15px var(--correct);
            transform: scale(1.02);
        }
        .wrong-ans {
            background-color: var(--wrong) !important;
            border-color: #fff !important;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
        .feedback.show-correct {
            color: var(--correct);
            text-shadow: 0 0 20px #fff;
            animation: popUp 1s ease forwards;
        }
        .feedback.show-wrong {
            color: var(--wrong);
            text-shadow: 0 0 20px #fff;
            animation: popUp 1s ease forwards;
        }
        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .hidden { display: none !important; }
        .btn-start {
            width: 100%;
            padding: 15px;
            font-size: 1.3em;
            background: var(--correct);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-start:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="feedback-text" class="feedback"></div>

<div class="quiz-container">
    <div id="start-screen">
        <h1 style="text-align: center; color: #34d399;">Trắc Nghiệm Tốc Độ</h1>
        <h3 style="text-align: center;">60 Câu - SKMT & Bệnh Nghề Nghiệp</h3>
        <p style="text-align: center; line-height: 1.6; color: #a5b4fc;">
            Thể lệ: Chỉ có 1 đáp án đúng duy nhất (A, B, C hoặc D).<br>
            Trả lời đúng sẽ có pháo hoa rực rỡ, trả lời sai sẽ bị rung chấn!<br>
            Bạn đã sẵn sàng chưa?
        </p>
        <button class="btn-start" onclick="startQuiz()">Chiến luôn!</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="question-counter">Câu: 1/60</span>
            <span id="score-counter">Điểm: 0</span>
        </div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 style="text-align: center;">Hoàn thành xuất sắc!</h1>
        <h2 id="final-score" style="text-align: center; color: #34d399; font-size: 3em; margin: 20px 0;">0/60</h2>
        <p id="eval-msg" style="text-align: center; font-size: 1.2em;"></p>
        <button class="btn-start" style="margin-top: 20px;" onclick="location.reload()">Chơi lại từ đầu</button>
    </div>
</div>

<script>
// Dữ liệu 60 câu hỏi dạng ABCD

let currentIndex = 0;
let score = 0;
let canAnswer = true;

const startScreen = document.getElementById('start-screen');
const quizScreen = document.getElementById('quiz-screen');
const resultScreen = document.getElementById('result-screen');
const qText = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const qCounter = document.getElementById('question-counter');
const scoreCounter = document.getElementById('score-counter');
const feedbackText = document.getElementById('feedback-text');

function startQuiz() {
    startScreen.classList.add('hidden');
    quizScreen.classList.remove('hidden');
    loadQuestion();
}

function loadQuestion() {
    if (currentIndex >= questions.length) {
        showResults();
        return;
    }

    canAnswer = true;
    const q = questions[currentIndex];
    qCounter.textContent = `Câu: ${currentIndex + 1}/${questions.length}`;
    scoreCounter.textContent = `Điểm: ${score}`;
    
    qText.innerHTML = `<strong>Câu ${currentIndex + 1}:</strong> ${q.q}`;
    optionsContainer.innerHTML = '';

    const labels = ["A", "B", "C", "D"];
    q.opts.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-label">${labels[index]}</span> ${opt}`;
        btn.onclick = () => handleAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });
}

function handleAnswer(selectedIndex, btnNode) {
    if (!canAnswer) return;
    canAnswer = false; // Khóa không cho bấm nữa
    
    const q = questions[currentIndex];
    const isCorrect = (selectedIndex === q.ans);
    const allBtns = document.querySelectorAll('.option-btn');
    
    // Vô hiệu hóa tất cả các nút
    allBtns.forEach(b => b.disabled = true);

    if (isCorrect) {
        // Đúng -> Confetti + Xanh lá
        score++;
        btnNode.classList.add('correct-ans');
        triggerConfetti();
        showFeedback("Tuyệt vời! ✓", true);
    } else {
        // Sai -> Rung lắc + Đỏ, bôi xanh đáp án đúng
        btnNode.classList.add('wrong-ans');
        allBtns[q.ans].classList.add('correct-ans'); // Hiển thị đáp án đúng
        showFeedback("Sai rồi! ✗", false);
    }

    // Đợi 1.5 giây rồi chuyển câu
    setTimeout(() => {
        currentIndex++;
        loadQuestion();
    }, 1500);
}

function triggerConfetti() {
    confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#10b981', '#34d399', '#ffffff', '#fbbf24']
    });
}

function showFeedback(text, isCorrect) {
    feedbackText.textContent = text;
    feedbackText.className = 'feedback ' + (isCorrect ? 'show-correct' : 'show-wrong');
    
    // Reset class sau khi animate xong để dùng lại
    setTimeout(() => {
        feedbackText.className = 'feedback';
    }, 1000);
}

function showResults() {
    quizScreen.classList.add('hidden');
    resultScreen.classList.remove('hidden');
    document.getElementById('final-score').textContent = `${score}/${questions.length}`;
    
    const msg = document.getElementById('eval-msg');
    if (score >= 50) msg.textContent = "Đỉnh của chóp! Đề thi này không làm khó được bạn.";
    else if (score >= 40) msg.textContent = "Rất xuất sắc! Kiến thức vững vàng.";
    else if (score >= 25) msg.textContent = "Khá khen cho sự nỗ lực! Hãy ôn tập thêm nhé.";
    else msg.textContent = "Ui da... Cần phải cày lại slide bài giảng rồi bạn ơi!";
    
    // Bắn pháo hoa liên tục nếu điểm cao
    if (score >= 40) {
        let duration = 3 * 1000;
        let end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#10b981']});
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4f46e5']});
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
}
</script>
</body>
